<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方向三：毛绒玩具 · 心晴岛</title>
<style>
/* === 方向三：毛绒玩具体系 Soft Toy Universe ===
   设计哲学：可爱 > 克制，触感 > 距离，愉悦 > 严肃
   参照：Jellycat × LINE Friends × Pokémon
   色彩：奶油底 + 棉花糖渐变 + 柔光阴影（全是软的东西）
   字体：圆体（系统自带）+ 大字号 + 松排版
*/

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #fcf5f0;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 20px;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

.phone {
  width: 390px; height: 844px;
  background: linear-gradient(180deg, #fff8f4 0%, #fff0e8 30%, #fef5ee 100%);
  border-radius: 44px;
  overflow: hidden;
  box-shadow:
    0 8px 32px rgba(180,140,120,0.12),
    0 0 0 1px rgba(200,160,140,0.15);
  position: relative;
  display: flex; flex-direction: column;
}

/* Soft header */
.header {
  padding: 20px 22px 12px;
  display: flex; justify-content: space-between; align-items: center;
}

.greeting h2 {
  font-size: 24px; font-weight: 800; color: #5a3a2a;
}

.greeting p {
  font-size: 13px; color: #b89888; margin-top: 2px;
  font-weight: 500;
}

.coin {
  background: linear-gradient(135deg, #ffe8c0, #ffd4a0);
  padding: 10px 18px; border-radius: 22px;
  font-size: 14px; font-weight: 800; color: #7a5020;
  box-shadow:
    0 4px 12px rgba(255,180,100,0.3),
    inset 0 1px 0 rgba(255,255,255,0.5);
}

/* Island - big rounded soft frame */
.island-area {
  margin: 8px 20px;
  height: 290px;
  border-radius: 32px;
  background: linear-gradient(180deg, #e8f0ff 0%, #e8f8f0 45%, #fff0e0 100%);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.6),
    0 8px 24px rgba(120,100,80,0.1);
  position: relative;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.6);
}

.island-area::after {
  content: '3D 岛屿场景';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: rgba(120,140,160,0.4);
  font-weight: 600; letter-spacing: 0.06em;
}

/* Actions - pill shaped */
.actions {
  padding: 16px 20px 8px;
  display: flex; gap: 10px;
}

.pill-btn {
  flex: 1; padding: 18px 14px;
  border-radius: 24px; border: none;
  cursor: pointer; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  text-align: left;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}

.pill-btn:active { transform: scale(0.95); }

.pill-btn.primary {
  background: linear-gradient(135deg, #ffc8a0, #ffb080);
  color: #4a2a10;
  box-shadow: 0 6px 20px rgba(255,160,100,0.3);
}

.pill-btn.secondary {
  background: #fff;
  color: #5a3a2a;
  border: 1.5px solid rgba(200,160,140,0.2);
}

.pill-btn .icon { font-size: 28px; display: block; margin-bottom: 4px; }
.pill-btn strong { font-size: 16px; font-weight: 700; }
.pill-btn small { font-size: 11px; opacity: 0.55; display: block; margin-top: 2px; }

/* Status - plush card */
.status-card {
  margin: 8px 20px;
  padding: 16px 18px;
  background: #fff;
  border-radius: 22px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.04);
  border: 1.5px solid rgba(200,160,140,0.1);
}

.label { font-size: 11px; color: #b89888; font-weight: 700; letter-spacing: 0.04em; }

.mood-row { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 10px; }
.mood { text-align: center; }
.mood .emoji {
  font-size: 36px;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
}
.mood .score { font-size: 14px; font-weight: 700; color: #7a5a4a; margin-top: 4px; display: block; }
.arrow { font-size: 22px; color: #c0a090; }

/* Resources - pill group */
.resources {
  padding: 14px 20px;
  display: flex; gap: 10px;
}

.resource {
  flex: 1; text-align: center;
  padding: 14px 6px;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.03);
  border: 1px solid rgba(200,160,140,0.08);
}

.resource .icon { font-size: 18px; }
.resource .value { font-size: 17px; font-weight: 800; color: #5a3a2a; margin-top: 4px; display: block; }
.resource .label { font-size: 10px; font-weight: 600; margin-top: 2px; }

/* Bottom nav - floating pill bar */
.bottom-nav {
  margin: auto 16px 20px;
  padding: 10px 8px;
  display: flex; justify-content: space-around;
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.06), 0 0 0 1px rgba(200,160,140,0.1);
}

.nav-item {
  text-align: center; background: none; border: none;
  font-size: 11px; font-weight: 600; color: #b89888; cursor: pointer;
  padding: 8px 10px; border-radius: 16px; transition: all 0.2s ease;
}

.nav-item.active {
  color: #e08060;
  background: linear-gradient(135deg, rgba(255,180,140,0.2), rgba(255,200,160,0.15));
}

.nav-item .icon { font-size: 22px; display: block; margin-bottom: 3px; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="greeting"><h2>小晴</h2><p>来照顾你的小岛吧</p></div>
    <div class="coin">💰 50</div>
  </div>

  <div class="island-area"></div>

  <div class="actions">
    <button class="pill-btn primary">
      <span class="icon">🌤</span><strong>记录心情</strong><small>+5 金币</small>
    </button>
    <button class="pill-btn secondary">
      <span class="icon">🫧</span><strong>快速补给</strong><small>缓解压力</small>
    </button>
  </div>

  <div class="status-card">
    <span class="label">今日心情</span>
    <div class="mood-row">
      <div class="mood"><span class="emoji">🌤</span><span class="score">6 分</span></div>
      <span class="arrow">→</span>
      <div class="mood"><span class="emoji">😌</span><span class="score">4 分</span></div>
    </div>
  </div>

  <div class="resources">
    <div class="resource"><span class="icon">☀️</span><span class="value">12</span><span class="label">阳光</span></div>
    <div class="resource"><span class="icon">💧</span><span class="value">8</span><span class="label">水滴</span></div>
    <div class="resource"><span class="icon">🕯️</span><span class="value">1</span><span class="label">小灯</span></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active"><span class="icon">🏝</span>小岛</button>
    <button class="nav-item"><span class="icon">🌤</span>天气</button>
    <button class="nav-item"><span class="icon">🫧</span>补给</button>
    <button class="nav-item"><span class="icon">🕯</span>温暖</button>
    <button class="nav-item"><span class="icon">📒</span>成长</button>
  </div>
</div>
</body>
</html>
